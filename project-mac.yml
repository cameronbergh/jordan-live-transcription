name: JordanTranscriberMac
options:
  bundleIdPrefix: com.jordan
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  JordanTranscriberMac:
    type: application
    platform: macOS
    sources:
      - path: JordanTranscriberMac
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordan.transcriber.mac
        INFOPLIST_FILE: JordanTranscriberMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: JordanTranscriberMac/Resources/JordanTranscriberMac.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: JordanTranscriberMac/Resources/Info.plist
      properties:
        CFBundleDisplayName: Jordan Transcriber
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSMicrophoneUsageDescription: "Jordan Transcriber needs microphone access to transcribe nearby speech in real time."
